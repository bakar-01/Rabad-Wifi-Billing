{% extends "layout.html" %}
{% block title %}Password updated{% endblock %}
{% block content %}

  <div class="auth-card">
    <p class="eyebrow">Account recovery</p>
    <h1>Password updated</h1>

  </div>
</section>
{% endblock %}
