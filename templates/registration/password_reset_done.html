{% extends "layout.html" %}
{% block title %}Check your email{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <p class="eyebrow">Account recovery</p>
    <h1>Check your email</h1>
    <p>If the address is registered, a password reset link has been sent. Open the link to choose a new password.</p>
    <a class="primary as-link" href="{% url 'login' %}">Back to sign in</a>
  </div>
</section>
{% endblock %}
